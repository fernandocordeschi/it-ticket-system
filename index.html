<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket System Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🎫 Ticket System Demo</h1>
    </header>

    <main>
        <section id="create-ticket">
            <input id="user" placeholder="Usuario">
            <input id="issue" placeholder="Problema">
            <select id="priority">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>
            <button id="createTicketBtn">Crear Ticket</button>
        </section>
    
        <div id="ticket-container">
            <!-- Las tarjetas de los tickets se insertarán aquí -->
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
